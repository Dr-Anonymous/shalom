---
---

<head>
    <meta charset="utf-8">
    <title>Manage Songs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link id="fontFamily" rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:400italic,400">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://shalomworshipcentre.com/assets/css/font-awesome.css">
    <link rel="stylesheet" href="https://shalomworshipcentre.com/assets/css/style.css">
    <link rel="stylesheet" href="https://shalomworshipcentre.com/assets/css/songsbook.css">
    <link rel="shortcut icon" href="https://shalomworshipcentre.com/assets/ico/favicon.ico">
    <!-- javascript -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/8.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.7.0/firebase-firestore.js"></script>
    <script src="/assets/js/manage-songs.js"></script>
</head>

<body>
    <!-- Header -->
    <div class="container">
        <div class="header row" style="--bs-gutter-x: 0;">
            <div class="span12">
                <div class="navbar">
                    <div class="navbar-inner">
                        <h1><a class="brand" href="/">Shalom Worship Centre</a></h1>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Page Title -->
    <div class="page-title">
        <div class="container">
            <div class="row">
                <div class="col">
                    <h3>Manage Songs</h3>
                    <button class="btn btn-primary mt-3" onclick="openEditor()">Add New Song</button>
                    <div class="ca-text input-group mt-3">
                        <input type="text" class="form-control" id="searchSongs" placeholder="Search songs..."
                            autocomplete="off" onkeyup="filterSongs()" />
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mb-5">
        <div class="row">
            <div class="col-12" id="song-list-container">
                <div id="song-list" class="list-group">
                    <!-- Songs will be loaded here -->
                    <div class="text-center py-5">Loading songs from Firestore...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Editor Modal -->
    <div class="modal fade" id="songEditorModal" tabindex="-1" aria-labelledby="songEditorModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="songEditorModalLabel">Edit Song</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editSongDocId" value="">

                    <div class="mb-3">
                        <label for="editSongTitle" class="form-label">Song Title</label>
                        <input type="text" class="form-control" id="editSongTitle" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label mb-2 fw-bold">Slides</label>
                        <div id="slides-container">
                            <!-- Slide textareas go here -->
                        </div>
                    </div>
                </div>
                <div class="modal-footer d-flex justify-content-between">
                    <button type="button" class="btn btn-outline-success" onclick="addSlideField()">+ Add Slide</button>
                    <div>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary" onclick="saveSong()" id="saveSongBtn">Save
                            changes</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!--toast-->
    <div class="position-fixed top-50 start-50 translate-middle" style="z-index: 1060">
        <div id="myToast" class="toast fade hide" role="alert">
            <div class="toast-header">
                <strong class="me-auto">Notification</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">
                <div id="toastBody"></div>
            </div>
        </div>
    </div>
</body>
